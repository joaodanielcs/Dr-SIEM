version: '3.8'

services:
  # Banco relacional para usuários e configurações de infraestrutura
  relational_db:
    image: postgres:15-alpine
    container_name: dr_siem_pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data

  # O motor colunar de alta performance para os milhões de logs
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: dr_siem_clickhouse
    restart: always
    ports:
      - "8123:8123"      # Interface HTTP para a aplicação Node.js
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server

  # O cérebro do SIEM
  app:
    image: node:18-alpine
    container_name: dr_siem_backend
    restart: always
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    ports:
      - "8080:8080"      # Interface Web
      - "514:514/udp"    # Coletor Syslog UDP para os Pi-holes
    environment:
      PG_HOST: relational_db
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
      PG_NAME: ${POSTGRES_DB}
      CH_HOST: http://clickhouse:8123
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin}
    depends_on:
      - relational_db
      - clickhouse
    command: sh -c "npm install && node server.js"

volumes:
  pg_data:
  ch_data:
  ch_logs:
