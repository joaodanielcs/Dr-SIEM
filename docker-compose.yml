version: '3.8'

services:
  relational_db:
    image: postgres:15-alpine
    container_name: dr_siem_pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: dr_siem_clickhouse
    restart: always
    ports:
      - "8123:8123"      
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server

  app:
    image: node:18-alpine
    container_name: dr_siem_backend
    restart: always
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
    ports:
      - "443:8443"       # ◄ MUDANÇA: Recebe HTTPS na 443 física e joga na 8443 HTTPS do Node
      - "514:514/udp"    # Ingestão de logs dos Pi-holes
    environment:
      PG_HOST: relational_db
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}
      PG_NAME: ${POSTGRES_DB}
      CH_HOST: http://clickhouse:8123
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
    depends_on:
      - relational_db
      - clickhouse
    command: sh -c "npm install && node server.js"

volumes:
  pg_data:
  ch_data:
  ch_logs:
