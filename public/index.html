<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM // DR.MONITORA</title>
    <style>
        :root {
            --bg-color: #1a2332;
            --card-color: #242f41;
            --text-color: #ffffff;
            --accent-color: #1abc9c;
            --error-color: #e74c3c;
            --input-bg: #151d2a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: var(--card-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #8a9ba8;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #a3b2c1;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #34495e;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            margin-top: 10px;
        }
        button:hover {
            background-color: #16a085;
        }
        .error-box {
            background-color: rgba(231, 76, 60, 0.15);
            border: 1px solid var(--error-color);
            color: #ff7675;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        .screen { display: none; }
        .active { display: block; }
        .ad-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="login-screen" class="container screen active">
        <h2>SIEM // DR.MONITORA</h2>
        <div class="subtitle">Autenticação do Sistema</div>
        <div id="login-error" class="error-box"></div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Usuário / Domínio</label>
                <input type="text" id="username" placeholder="Ex: admin ou usuario" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Chave de Acesso</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit">Autenticar</button>
        </form>
    </div>

    <div id="password-screen" class="container screen">
        <h2>REDEFINIR ACESSO</h2>
        <div class="subtitle">Primeiro acesso detectado. Altere a senha do ADMIN.</div>
        <div id="pass-error" class="error-box"></div>
        <form onsubmit="handleChangePassword(event)">
            <div class="form-group">
                <label>Nova Senha Corporativa</label>
                <input type="password" id="new-password" placeholder="Mínimo 8 caracteres" required minlength="8">
            </div>
            <button type="submit">Gravar Nova Senha</button>
        </form>
    </div>

    <div id="settings-screen" class="container screen" style="max-width: 600px;">
        <h2>INTEGRAÇÃO COM ACTIVE DIRECTORY</h2>
        <div class="subtitle">Painel de Controle de Identidades</div>
        <div id="settings-msg" class="error-box" style="border-color: var(--accent-color); color: var(--accent-color); background: rgba(26,188,156,0.1)"></div>
        <form onsubmit="handleSaveSettings(event)" class="ad-grid">
            <div class="form-group">
                <label>IP do Controlador de Domínio (AD)</label>
                <input type="text" id="ad-ip" placeholder="Ex: 10.0.0.10" required>
            </div>
            <div class="form-group">
                <label>Domínio Principal</label>
                <input type="text" id="ad-domain" placeholder="Ex: empresa.local" required>
            </div>
            <div class="form-group">
                <label>Usuário de Serviço (sAMAccountName)</label>
                <input type="text" id="ad-user" placeholder="Ex: svc_siem" required>
            </div>
            <div class="form-group">
                <label>Senha do Usuário</label>
                <input type="password" id="ad-pass" placeholder="••••••••" required>
            </div>
            <div class="form-group full-width">
                <label>Grupo do AD com Permissão de Acesso</label>
                <input type="text" id="ad-group" placeholder="Ex: GG_SIEM_OPERADORES" required>
            </div>
            <button type="submit" class="full-width">Salvar e Ativar Conexão</button>
        </form>
    </div>

    <script>
        let sessionToken = '';

        function showError(elementId, msg) {
            const box = document.getElementById(elementId);
            box.innerText = msg;
            box.style.display = 'block';
        }

        async function handleLogin(e) {
            e.preventDefault();
            document.getElementById('login-error').style.display = 'none';
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            
            const data = await res.json();
            if(!res.ok) return showError('login-error', data.error);

            sessionToken = data.token;
            
            if(data.force_change) {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('password-screen').classList.add('active');
            } else {
                showSettingsScreen();
            }
        }

        async function handleChangePassword(e) {
            e.preventDefault();
            document.getElementById('pass-error').style.display = 'none';

            const res = await fetch('/api/auth/change-password', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': sessionToken
                },
                body: JSON.stringify({ new_password: document.getElementById('new-password').value })
            });

            if(!res.ok) {
                const data = await res.json();
                return showError('pass-error', data.error);
            }

            showSettingsScreen();
        }

        async function showSettingsScreen() {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('password-screen').classList.remove('active');
            document.getElementById('settings-screen').classList.add('active');

            const res = await fetch('/api/settings', {
                headers: { 'Authorization': sessionToken }
            });
            if(res.ok) {
                const config = await res.json();
                if(config.ad_ip) document.getElementById('ad-ip').value = config.ad_ip;
                if(config.ad_domain) document.getElementById('ad-domain').value = config.ad_domain;
                if(config.ad_user) document.getElementById('ad-user').value = config.ad_user;
                if(config.ad_pass) document.getElementById('ad-pass').value = config.ad_pass;
                if(config.ad_group) document.getElementById('ad-group').value = config.ad_group;
            }
        }

        async function handleSaveSettings(e) {
            e.preventDefault();
            const msgBox = document.getElementById('settings-msg');
            msgBox.style.display = 'none';

            const res = await fetch('/api/settings', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': sessionToken
                },
                body: JSON.stringify({
                    ad_ip: document.getElementById('ad-ip').value,
                    ad_domain: document.getElementById('ad-domain').value,
                    ad_user: document.getElementById('ad-user').value,
                    ad_pass: document.getElementById('ad-pass').value,
                    ad_group: document.getElementById('ad-group').value
                })
            });

            if(res.ok) {
                msgBox.innerText = "✓ Configurações salvas! SIEM integrado ao AD com sucesso.";
                msgBox.style.display = 'block';
            } else {
                const data = await res.json();
                showError('settings-msg', data.error);
            }
        }
    </script>
</body>
</html>
